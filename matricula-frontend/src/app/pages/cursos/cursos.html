<div class="container mt-4">

  <h3>Lista de Cursos</h3>

  <table class="table table-bordered table-striped mt-3">

    <thead class="table-dark">
      <tr>
        <th>Código</th>
        <th>Nombre</th>
        <th>Créditos</th>
        <th>Modalidad</th>
        <th>Vacantes</th>
        <th>Estado</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let c of cursos">
        <td>{{ c.codigo }}</td>
        <td>{{ c.nombre }}</td>
        <td>{{ c.creditos }}</td>
        <td>{{ c.modalidad }}</td>
        <td>{{ c.vacantes }}</td>

        <td [ngClass]="c.vacantes > 0 ? 'text-success' : 'text-danger'">
          {{ estado(c.vacantes) }}
        </td>

      </tr>
    </tbody>

  </table>

</div>
